<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✦ Central de IAs</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
    <style>
        :root {
            --bg: #0c0c0f;
            --bg2: #050508;
            --glass: rgba(18, 18, 22, 0.65);
            --purple: #8b5cf6;
            --purple2: #a78bfa;
            --text: #f1f1f1;
            --text2: #a1a1aa;
            --border: rgba(139, 92, 246, 0.2);
            --radius: 1.5rem;
            --blur: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg), var(--bg2));
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        #app {
            display: flex;
            height: 100%;
            position: relative;
            max-width: 900px;
            margin: 0 auto;
        }
        /* Sidebar */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 80%;
            max-width: 360px;
            height: 100%;
            height: 100dvh;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border-right: 1px solid var(--border);
            transform: translateX(-105%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.8rem;
            overflow-y: auto;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 99;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--purple2), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border-radius: 0.8rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: left;
        }
        .sidebar-btn:hover,
        .sidebar-btn:active {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--border);
        }
        .sidebar-btn.danger {
            color: #ef4444;
        }
        .sidebar-btn.danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }
        #conv-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .conv-item {
            padding: 0.7rem 1rem;
            border-radius: 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text2);
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }
        .conv-item:hover,
        .conv-item.active {
            background: rgba(139, 92, 246, 0.2);
            color: var(--text);
            border-color: var(--border);
        }
        .conv-item .time {
            font-size: 0.7rem;
            color: var(--text2);
            flex-shrink: 0;
            margin-left: 0.5rem;
        }
        #sidebar-search {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
        }
        /* Main */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 1;
        }
        #header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border);
            background: rgba(12, 12, 15, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
            flex-shrink: 0;
        }
        #header.hidden {
            display: none;
        }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .icon-btn:hover,
        .icon-btn:active {
            background: rgba(139, 92, 246, 0.25);
        }
        #chat-title {
            flex: 1;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Hero */
        #hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1rem;
            transition: all 0.3s;
        }
        #hero.hidden {
            display: none;
        }
        .hero-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple2), #fff, var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInScale 0.6s ease;
        }
        .hero-sub {
            color: var(--text2);
            font-size: 0.95rem;
            animation: fadeInScale 0.6s ease 0.1s both;
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        #hero-input {
            width: 100%;
            max-width: 600px;
            min-height: 60px;
            max-height: 160px;
            padding: 1rem;
            border-radius: 1.2rem;
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: all 0.3s;
            line-height: 1.5;
        }
        #hero-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .hero-btns {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn:hover,
        .btn:active {
            background: rgba(139, 92, 246, 0.3);
            border-color: var(--purple);
        }
        .btn.primary {
            background: var(--purple);
            border-color: var(--purple);
            font-weight: 600;
        }
        .btn.primary:hover {
            background: var(--purple2);
        }
        .shortcut-btns {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shortcut-btns .btn {
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 1.5rem;
        }
        /* Chat */
        #chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-view.active {
            display: flex;
        }
        #msg-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            scroll-behavior: smooth;
        }
        .msg {
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            animation: fadeInScale 0.3s ease;
            word-break: break-word;
            position: relative;
            line-height: 1.5;
            font-size: 0.9rem;
        }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a1a2e, #1e1030);
            border: 1px solid var(--border);
            border-bottom-right-radius: 0.3rem;
        }
        .msg.ai {
            align-self: flex-start;
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-bottom-left-radius: 0.3rem;
            max-width: 90%;
        }
        .msg-actions {
            position: absolute;
            top: -8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .msg:hover .msg-actions,
        .msg:active .msg-actions {
            opacity: 1;
        }
        .msg-action-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            color: #fff;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .code-block-wrap {
            position: relative;
            margin: 0.5rem 0;
            border-radius: 0.8rem;
            overflow: hidden;
            background: #0a0a0f;
            border: 1px solid var(--border);
        }
        .code-block-wrap pre {
            margin: 0;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.8rem;
            line-height: 1.4;
            color: #d4d4d8;
        }
        .code-block-wrap code {
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        }
        .code-btns {
            position: absolute;
            top: 6px;
            right: 8px;
            display: flex;
            gap: 4px;
        }
        .code-btn {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            background: rgba(139, 92, 246, 0.6);
            border: none;
            color: #fff;
            transition: all 0.2s;
        }
        .code-btn:hover {
            background: var(--purple);
        }
        /* Typing */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            align-self: flex-start;
            font-size: 0.8rem;
            color: var(--text2);
        }
        .typing-dots {
            display: flex;
            gap: 3px;
        }
        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--purple);
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes bounce {
            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            40% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
        /* Bottom bar */
        #bottom-bar {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 1rem;
            border-top: 1px solid var(--border);
            background: rgba(12, 12, 15, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            align-items: flex-end;
            flex-shrink: 0;
        }
        #chat-input {
            flex: 1;
            min-height: 42px;
            max-height: 120px;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            resize: none;
            outline: none;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        #chat-input:focus {
            border-color: var(--purple);
        }
        /* File preview */
        #file-previews {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            padding: 0.4rem 1rem;
        }
        .file-preview-item {
            position: relative;
            width: 56px;
            height: 56px;
            border-radius: 0.6rem;
            overflow: hidden;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        .file-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .file-preview-item .file-icon {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.65rem;
            color: var(--text2);
            text-align: center;
            padding: 2px;
            word-break: break-all;
        }
        .file-preview-item .remove-file {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Scroll btn */
        #scroll-bottom-btn {
            position: absolute;
            bottom: 90px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--purple);
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            display: none;
            z-index: 5;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.5);
            transition: all 0.3s;
        }
        #scroll-bottom-btn.show {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInScale 0.3s ease;
        }
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            color: var(--text);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .modal h3 {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            color: var(--purple2);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0;
            line-height: 1;
        }
        .model-card {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            border-radius: 0.8rem;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 0.4rem;
            transition: all 0.2s;
        }
        .model-card:hover {
            background: rgba(139, 92, 246, 0.15);
        }
        .model-card.active {
            border-color: var(--purple);
            background: rgba(139, 92, 246, 0.2);
        }
        .model-card .provider-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 1rem;
            background: var(--purple);
            color: #fff;
            flex-shrink: 0;
        }
        .model-card .provider-tag.groq {
            background: #f97316;
        }
        /* Slider */
        input[type="range"] {
            width: 100%;
            accent-color: var(--purple);
            margin: 0.5rem 0;
        }
        .slider-val {
            font-weight: 600;
            color: var(--purple2);
        }
        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast {
            padding: 0.7rem 1.4rem;
            border-radius: 2rem;
            background: rgba(30, 30, 40, 0.9);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.85rem;
            animation: fadeInScale 0.3s ease, fadeOut 0.3s ease 1.8s forwards;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: auto;
            text-align: center;
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(10px);
            }
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--purple);
            border-radius: 4px;
        }
        /* Responsive */
        @media (max-width: 600px) {
            .hero-title {
                font-size: 1.5rem;
            }
            .msg {
                max-width: 92%;
            }
            #header {
                padding: 0.5rem 0.7rem;
            }
            .icon-btn {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Overlay -->
        <div id="overlay" onclick="toggleSidebar()"></div>
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-title">✦ Conversas</div>
            <button class="sidebar-btn" onclick="newConversation()">➕ Nova Conversa</button>
            <button class="sidebar-btn" onclick="exportCurrent()">📎 Exportar</button>
            <button class="sidebar-btn" onclick="importConversation()">📂 Importar</button>
            <input type="text" id="sidebar-search" placeholder="🔍 Buscar conversas..." oninput="renderConvList()">
            <div id="conv-list"></div>
            <button class="sidebar-btn danger" onclick="deleteCurrentSession()">🗑 Apagar conversa atual</button>
        </div>
        <!-- Main -->
        <div id="main">
            <!-- Header -->
            <div id="header">
                <button class="icon-btn" onclick="toggleSidebar()" title="Menu">☰</button>
                <span id="chat-title">Central de IAs</span>
                <button class="icon-btn" onclick="toggleFocus()" title="Modo Foco">🎯</button>
                <button class="icon-btn" onclick="openStats()" title="Estatísticas">📊</button>
                <button class="icon-btn" onclick="openSettings()" title="Configurações">⚙️</button>
                <button class="icon-btn" onclick="openModelSelector()" title="Modelos">🤖</button>
            </div>
            <!-- Hero -->
            <div id="hero">
                <div class="hero-title">✦ Central de IAs</div>
                <div class="hero-sub">Pergunte qualquer coisa. IA rápida e poderosa.</div>
                <textarea id="hero-input" placeholder="Digite sua pergunta aqui..." rows="2"></textarea>
                <div id="file-previews"></div>
                <div class="hero-btns">
                    <button class="btn" onclick="attachFiles()">📎 Anexar</button>
                    <button class="btn" onclick="openModelSelector()">🤖 Modelos</button>
                    <button class="btn primary" onclick="sendFromHero()">➤ Enviar</button>
                </div>
                <div class="shortcut-btns">
                    <button class="btn" onclick="fillHero('Explique de forma simples: ')">💡 Explique</button>
                    <button class="btn" onclick="fillHero('Me ensine sobre: ')">🎓 Me ensine</button>
                    <button class="btn" onclick="fillHero('Escreva um texto sobre: ')">✍️ Escreva</button>
                </div>
            </div>
            <!-- Chat View -->
            <div id="chat-view">
                <div id="msg-list"></div>
                <div id="typing-area"></div>
                <button id="scroll-bottom-btn" onclick="scrollToBottom()">↓</button>
                <div id="file-previews-chat"></div>
                <div id="bottom-bar">
                    <button class="icon-btn" onclick="attachFiles()" title="Anexar">📎</button>
                    <textarea id="chat-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
                    <button class="icon-btn" onclick="sendFromChat()" title="Enviar" style="background:var(--purple);">➤</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Modals -->
    <div class="modal-overlay" id="modal-model">
        <div class="modal"><button class="modal-close" onclick="closeModal('modal-model')">✕</button><h3>🤖 Selecionar Modelo</h3><div id="model-list"></div></div>
    </div>
    <div class="modal-overlay" id="modal-settings">
        <div class="modal"><button class="modal-close" onclick="closeModal('modal-settings')">✕</button><h3>⚙️ Configurações</h3><label>Temperatura: <span class="slider-val" id="temp-val">0.7</span></label><input type="range" id="temp-slider" min="0" max="1.5" step="0.05" value="0.7" oninput="document.getElementById('temp-val').textContent=this.value"><br><label>Limite de contexto: <span class="slider-val" id="ctx-val">50</span> mensagens</label><input type="range" id="ctx-slider" min="1" max="200" value="50" oninput="document.getElementById('ctx-val').textContent=this.value"><br><button class="btn primary" onclick="saveSettings()" style="margin-top:1rem;">Salvar</button></div>
    </div>
    <div class="modal-overlay" id="modal-stats">
        <div class="modal"><button class="modal-close" onclick="closeModal('modal-stats')">✕</button><h3>📊 Estatísticas</h3><div id="stats-content"></div><button class="btn" onclick="closeModal('modal-stats')" style="margin-top:1rem;">Fechar</button></div>
    </div>
    <!-- Toast container -->
    <div id="toast-container"></div>
    <!-- Hidden file input -->
    <input type="file" id="file-input" multiple accept="image/*,.txt,.md,.json" style="display:none" onchange="handleFiles(this)">
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(this)">

    <script>
        // ─── CONSTANTS ───
        const GEMINI_KEY = "AIzaSyDjK0veCamZthobXFjPyPoJEatkbUJbHpE";
        const GROQ_KEY = "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";
        const MODELS = [
            { id: "gemini:gemini-2.5-flash-lite", provider: "gemini", name: "Gemini 2.5 Flash Lite",
                desc: "Rápido, 1M contexto" },
            { id: "gemini:gemini-2.5-flash", provider: "gemini", name: "Gemini 2.5 Flash", desc: "Equilibrado" },
            { id: "gemini:gemini-3-flash-preview", provider: "gemini", name: "Gemini 3 Flash Preview",
            desc: "Última geração" },
            { id: "gemini:gemini-3.1-flash-lite-preview", provider: "gemini", name: "Gemini 3.1 Flash Lite",
                desc: "Muito rápido" },
            { id: "gemini:gemma-4-31b-it", provider: "gemini", name: "Gemma 4 31B", desc: "Google open" },
            { id: "groq:llama-3.1-8b-instant", provider: "groq", name: "Llama 3.1 8B", desc: "Instantâneo" },
            { id: "groq:llama-3.3-70b-versatile", provider: "groq", name: "Llama 3.3 70B", desc: "Potente" },
            { id: "groq:meta-llama/llama-4-scout-17b-16e-instruct", provider: "groq", name: "Llama 4 Scout",
                desc: "Inteligente" },
            { id: "groq:qwen/qwen3-32b", provider: "groq", name: "Qwen 3 32B", desc: "Raciocínio" }
        ];
        const TYPING_TEXTS = ["conectando neurônios...", "acessando dados...", "gerando resposta...",
            "processando contexto...", "formulando resposta..."
        ];

        // ─── STATE ───
        let state = {
            currentModel: MODELS[0],
            temperature: 0.7,
            contextLimit: 50,
            currentSessionId: null,
            sessions: [],
            messages: [],
            files: [],
            isStreaming: false,
            abortController: null,
            focusMode: false,
            typingTextIdx: 0,
            typingInterval: null,
        };

        // ─── STORAGE (localStorage) ───
        function storageGet(key, def = null) { try { const v = localStorage.getItem('cia_' + key); return v ? JSON
                .parse(v) : def; } catch (e) { return def; } }

        function storageSet(key, val) { localStorage.setItem('cia_' + key, JSON.stringify(val)); }

        function initStorage() {
            if (!storageGet('sessions')) storageSet('sessions', []);
            if (!storageGet('prefs')) storageSet('prefs', { temp: 0.7, ctxLimit: 50, modelIdx: 0 });
            state.sessions = storageGet('sessions');
            const prefs = storageGet('prefs');
            state.temperature = prefs.temp || 0.7;
            state.contextLimit = prefs.ctxLimit || 50;
            const mIdx = prefs.modelIdx || 0;
            state.currentModel = MODELS[mIdx] || MODELS[0];
            state.currentSessionId = storageGet('activeSession');
            if (state.currentSessionId) {
                state.messages = storageGet('msgs_' + state.currentSessionId, []);
            }
        }

        function savePrefs() {
            storageSet('prefs', { temp: state.temperature, ctxLimit: state.contextLimit, modelIdx: MODELS.findIndex(m =>
                    m.id === state.currentModel.id) });
        }

        function saveMessages() {
            if (state.currentSessionId) storageSet('msgs_' + state.currentSessionId, state.messages);
        }

        function createSession(title) {
            const id = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            const sess = { id, title: title || 'Nova conversa', updatedAt: Date.now() };
            state.sessions.unshift(sess);
            storageSet('sessions', state.sessions);
            return sess;
        }

        function updateSessionTitle(id, title) {
            const s = state.sessions.find(s => s.id === id);
            if (s) { s.title = title;
                s.updatedAt = Date.now();
                storageSet('sessions', state.sessions); }
        }

        function deleteSession(id) {
            state.sessions = state.sessions.filter(s => s.id !== id);
            storageSet('sessions', state.sessions);
            localStorage.removeItem('cia_msgs_' + id);
        }

        function loadSession(id) {
            state.currentSessionId = id;
            state.messages = storageGet('msgs_' + id, []);
            storageSet('activeSession', id);
        }

        // ─── TOAST ───
        function toast(msg) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2200);
        }

        // ─── MODALS ───
        function openModal(id) { document.getElementById(id).classList.add('show'); }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function openModelSelector() { renderModelList();
            openModal('modal-model'); }

        function openSettings() {
            document.getElementById('temp-slider').value = state.temperature;
            document.getElementById('temp-val').textContent = state.temperature;
            document.getElementById('ctx-slider').value = state.contextLimit;
            document.getElementById('ctx-val').textContent = state.contextLimit;
            openModal('modal-settings');
        }

        function openStats() {
            const allMsgs = [];
            state.sessions.forEach(s => { const ms = storageGet('msgs_' + s.id, []);
                allMsgs.push(...ms); });
            const totalMsgs = allMsgs.length;
            const totalChars = allMsgs.filter(m => m.role === 'ai').reduce((sum, m) => sum + (m.content || '').length, 0);
            const approxTokens = Math.round(totalChars / 4);
            document.getElementById('stats-content').innerHTML = `
            <p>📝 Total de mensagens (todas conversas): <b>${totalMsgs}</b></p>
            <p>🔢 Tokens aproximados: <b>${approxTokens.toLocaleString()}</b></p>
            <p>🤖 Modelo atual: <b>${state.currentModel.name}</b></p>
            <p>🌡 Temperatura: <b>${state.temperature}</b></p>`;
            openModal('modal-stats');
        }

        function saveSettings() {
            state.temperature = parseFloat(document.getElementById('temp-slider').value);
            state.contextLimit = parseInt(document.getElementById('ctx-slider').value);
            savePrefs();
            closeModal('modal-settings');
            toast('Configurações salvas');
        }

        function renderModelList() {
            const container = document.getElementById('model-list');
            container.innerHTML = MODELS.map(m => `
            <div class="model-card${m.id===state.currentModel.id?' active':''}" onclick="selectModel('${m.id}')">
            <span class="provider-tag${m.provider==='groq'?' groq':''}">${m.provider}</span>
            <div><b>${m.name}</b><br><small style="color:var(--text2)">${m.desc}</small></div>
            </div>`).join('');
        }

        function selectModel(id) {
            state.currentModel = MODELS.find(m => m.id === id) || state.currentModel;
            savePrefs();
            closeModal('modal-model');
            toast('Modelo: ' + state.currentModel.name);
        }

        // ─── SIDEBAR ───
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const open = !sb.classList.contains('open');
            sb.classList.toggle('open', open);
            ov.classList.toggle('show', open);
            if (open) renderConvList();
        }

        function renderConvList() {
            const q = (document.getElementById('sidebar-search')?.value || '').toLowerCase();
            const filtered = state.sessions.filter(s => (s.title || '').toLowerCase().includes(q));
            const container = document.getElementById('conv-list');
            container.innerHTML = filtered.map(s => `
            <div class="conv-item${s.id===state.currentSessionId?' active':''}" onclick="switchConversation('${s.id}')">
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${s.title||'Nova conversa'}</span>
            <span class="time">${new Date(s.updatedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
            </div>`).join('') || '<div style="color:var(--text2);font-size:0.8rem;padding:1rem;">Nenhuma conversa</div>';
        }

        function switchConversation(id) {
            if (state.isStreaming) { toast('Aguarde a resposta terminar'); return; }
            saveMessages();
            loadSession(id);
            updateUIForSession();
            toggleSidebar();
            toast('Conversa carregada');
        }

        function newConversation() {
            if (state.isStreaming) { toast('Aguarde...'); return; }
            saveMessages();
            const sess = createSession('Nova conversa');
            loadSession(sess.id);
            updateUIForSession();
            toggleSidebar();
            showHero();
            toast('Nova conversa criada');
        }

        function deleteCurrentSession() {
            if (!state.currentSessionId) return;
            if (!confirm('Apagar esta conversa?')) return;
            deleteSession(state.currentSessionId);
            state.currentSessionId = null;
            state.messages = [];
            storageSet('activeSession', null);
            updateUIForSession();
            showHero();
            renderConvList();
            toast('Conversa apagada');
        }

        function exportCurrent() {
            if (!state.currentSessionId || state.messages.length === 0) { toast('Nada para exportar'); return; }
            const data = {
                session: state.sessions.find(s => s.id === state.currentSessionId),
                messages: state.messages,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'conversa_' + state.currentSessionId + '.json';
            a.click();
            toast('Conversa exportada');
        }

        function importConversation() { document.getElementById('import-input').click(); }

        function handleImport(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    const newId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                    const sess = { id: newId, title: data.session?.title || 'Importada', updatedAt: Date.now() };
                    state.sessions.unshift(sess);
                    storageSet('sessions', state.sessions);
                    storageSet('msgs_' + newId, data.messages || []);
                    saveMessages();
                    loadSession(newId);
                    updateUIForSession();
                    renderConvList();
                    toast('Conversa importada!');
                } catch (err) { toast('Erro ao importar: JSON inválido'); }
            };
            reader.readAsText(file);
            input.value = '';
        }

        // ─── UI ───
        function showHero() {
            document.getElementById('hero').classList.remove('hidden');
            document.getElementById('chat-view').classList.remove('active');
            document.getElementById('chat-title').textContent = 'Central de IAs';
            document.getElementById('file-previews').innerHTML = '';
            document.getElementById('file-previews-chat').innerHTML = '';
            state.files = [];
        }

        function showChat() {
            document.getElementById('hero').classList.add('hidden');
            document.getElementById('chat-view').classList.add('active');
        }

        function updateUIForSession() {
            if (state.currentSessionId && state.messages.length > 0) {
                showChat();
                renderMessages();
                const sess = state.sessions.find(s => s.id === state.currentSessionId);
                document.getElementById('chat-title').textContent = sess?.title || 'Conversa';
            } else {
                showHero();
            }
            renderConvList();
        }

        function renderMessages() {
            const list = document.getElementById('msg-list');
            list.innerHTML = state.messages.map((m, i) => renderMessage(m, i)).join('');
            scrollToBottom(false);
        }

        function renderMessage(m, idx) {
            const isAi = m.role === 'ai';
            const content = isAi ? renderMarkdown(m.content || '') : escapeHtml(m.content || '');
            return `<div class="msg ${isAi?'ai':'user'}" data-idx="${idx}" oncontextmenu="msgContextMenu(event,${idx})">
            <div class="msg-actions">
            <button class="msg-action-btn" onclick="copyMsg(${idx})" title="Copiar">📋</button>
            ${isAi?`<button class="msg-action-btn" onclick="regenerate(${idx})" title="Regenerar">🔄</button>`:''}
            </div>
            <div class="msg-content">${content}</div>
            </div>`;
        }

        function escapeHtml(s) { const d = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }; return s
                .replace(/[&<>"']/g, c => d[c]); }

        function renderMarkdown(text) {
            if (!text) return '';
            let html;
            try { html = marked.parse(text); } catch (e) { html = escapeHtml(text); }
            // Wrap code blocks with buttons
            html = html.replace(/<pre><code( class="language-(\w*)")?>([\s\S]*?)<\/code><\/pre>/g, (match, attrs, lang,
                code) => {
                const escapedCode = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const codeId = 'code_' + Math.random().toString(36).slice(2, 8);
                return `<div class="code-block-wrap">
            <div class="code-btns">
            <button class="code-btn" onclick="copyCode('${codeId}')">📋 Copiar</button>
            <button class="code-btn" onclick="downloadCode('${codeId}','${lang||'txt'}')">💾 Baixar</button>
            </div>
            <pre><code id="${codeId}">${escapedCode}</code></pre></div>`;
            });
            return html;
        }

        function scrollToBottom(smooth = true) {
            const list = document.getElementById('msg-list');
            setTimeout(() => { list.scrollTo({ top: list.scrollHeight, behavior: smooth ? 'smooth' : 'auto' }); }, 50);
        }

        function updateScrollBtn() {
            const list = document.getElementById('msg-list');
            const btn = document.getElementById('scroll-bottom-btn');
            const dist = list.scrollHeight - list.scrollTop - list.clientHeight;
            btn.classList.toggle('show', dist > 100);
        }

        // ─── MESSAGE ACTIONS ───
        function msgContextMenu(e, idx) {
            e.preventDefault();
            const m = state.messages[idx];
            if (!m) return;
            const actions = ['Copiar texto'];
            if (m.role === 'ai') actions.push('Regenerar');
            const choice = prompt('Opções:\n1. Copiar texto\n' + (m.role === 'ai' ? '2. Regenerar\n' : '') +
                'Digite o número:');
            if (choice === '1') copyMsg(idx);
            if (choice === '2' && m.role === 'ai') regenerate(idx);
        }

        function copyMsg(idx) {
            const m = state.messages[idx];
            if (!m) return;
            navigator.clipboard.writeText(m.content).then(() => toast('Texto copiado!')).catch(() => toast('Erro ao copiar'));
        }

        function regenerate(idx) {
            if (state.isStreaming) return;
            const m = state.messages[idx];
            if (!m || m.role !== 'ai') return;
            // Remove this AI message and all after it, then resend the last user message
            const aiIdx = idx;
            let userIdx = aiIdx - 1;
            while (userIdx >= 0 && state.messages[userIdx].role !== 'user') userIdx--;
            if (userIdx < 0) return;
            const userMsg = state.messages[userIdx];
            state.messages = state.messages.slice(0, userIdx);
            saveMessages();
            renderMessages();
            sendMessage(userMsg.content, []);
        }

        function copyCode(codeId) {
            const el = document.getElementById(codeId);
            if (!el) return;
            const text = el.textContent || el.innerText || '';
            navigator.clipboard.writeText(text).then(() => toast('Código copiado!')).catch(() => toast('Erro ao copiar'));
        }

        function downloadCode(codeId, lang) {
            const el = document.getElementById(codeId);
            if (!el) return;
            const text = el.textContent || el.innerText || '';
            const ext = lang === 'javascript' ? 'js' : lang === 'python' ? 'py' : lang === 'html' ? 'html' : 'txt';
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'codigo.' + ext;
            a.click();
            toast('Arquivo baixado!');
        }

        // ─── FILES ───
        function attachFiles() {
            if (state.files.length >= 5) { toast('Máximo 5 arquivos'); return; }
            document.getElementById('file-input').click();
        }

        function handleFiles(input) {
            const files = Array.from(input.files);
            files.forEach(f => {
                if (f.size > 10 * 1024 * 1024) { toast('Arquivo >10MB: ' + f.name); return; }
                if (state.files.length >= 5) { toast('Máximo 5 arquivos'); return; }
                const reader = new FileReader();
                const isImage = f.type.startsWith('image/');
                reader.onload = function(e) {
                    const fileData = {
                        name: f.name,
                        type: f.type,
                        isImage,
                        data: isImage ? e.target.result : e.target.result,
                        base64: isImage ? e.target.result.split(',')[1] : null,
                    };
                    state.files.push(fileData);
                    renderFilePreviews();
                };
                if (isImage) reader.readAsDataURL(f);
                else reader.readAsText(f);
            });
            input.value = '';
        }

        function removeFile(idx) {
            state.files.splice(idx, 1);
            renderFilePreviews();
        }

        function renderFilePreviews() {
            const heroPrev = document.getElementById('file-previews');
            const chatPrev = document.getElementById('file-previews-chat');
            const html = state.files.map((f, i) => `
            <div class="file-preview-item">
            ${f.isImage?`<img src="${f.data}" alt="${f.name}">`:`<div class="file-icon">${f.name.slice(0,20)}</div>`}
            <button class="remove-file" onclick="removeFile(${i})">✕</button>
            </div>`).join('');
            if (heroPrev) heroPrev.innerHTML = html;
            if (chatPrev) chatPrev.innerHTML = html;
        }

        // ─── SEND ───
        function fillHero(text) { document.getElementById('hero-input').value = text;
            document.getElementById('hero-input').focus(); }

        function sendFromHero() {
            const input = document.getElementById('hero-input');
            const text = input.value.trim();
            if (!text && state.files.length === 0) return;
            if (state.isStreaming) return;
            if (!state.currentSessionId) {
                const sess = createSession(text.slice(0, 30) || 'Nova conversa');
                loadSession(sess.id);
            }
            showChat();
            updateUIForSession();
            document.getElementById('chat-title').textContent = state.sessions.find(s => s.id === state
            .currentSessionId)?.title || 'Conversa';
            sendMessage(text || 'Descreva este arquivo:', [...state.files]);
            input.value = '';
            state.files = [];
            renderFilePreviews();
        }

        function sendFromChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text && state.files.length === 0) return;
            if (state.isStreaming) return;
            if (!state.currentSessionId) {
                const sess = createSession(text.slice(0, 30) || 'Nova conversa');
                loadSession(sess.id);
                updateUIForSession();
                document.getElementById('chat-title').textContent = sess.title;
            }
            sendMessage(text || 'Descreva este arquivo:', [...state.files]);
            input.value = '';
            state.files = [];
            renderFilePreviews();
        }

        async function sendMessage(text, files) {
            if (state.isStreaming) return;
            // Check slash commands
            if (text.startsWith('/') && handleSlashCommand(text)) return;
            // Add user message
            const userMsg = { id: 'msg_' + Date.now(), role: 'user', content: text, timestamp: Date.now(), files: files
                    .map(f => ({ name: f.name, type: f.type, isImage: f.isImage })) };
            state.messages.push(userMsg);
            saveMessages();
            if (state.messages.length === 1 && state.currentSessionId) {
                updateSessionTitle(state.currentSessionId, text.slice(0, 30) || 'Nova conversa');
            }
            renderMessages();
            scrollToBottom();
            // Update session timestamp
            const sess = state.sessions.find(s => s.id === state.currentSessionId);
            if (sess) { sess.updatedAt = Date.now();
                storageSet('sessions', state.sessions); }
            // Prepare for AI response
            const aiMsgId = 'msg_' + Date.now() + '_ai';
            state.messages.push({ id: aiMsgId, role: 'ai', content: '', timestamp: Date.now() });
            saveMessages();
            renderMessages();
            startTypingIndicator();
            state.isStreaming = true;
            state.abortController = new AbortController();
            // Build history
            const contextMsgs = state.messages.slice(-state.contextLimit - 1, -1);
            try {
                if (state.currentModel.provider === 'gemini') {
                    await streamGemini(contextMsgs, files, (chunk) => {
                        const msg = state.messages.find(m => m.id === aiMsgId);
                        if (msg) { msg.content += chunk;
                            updateLastAiMessage(); }
                    });
                } else {
                    await streamGroq(contextMsgs, files, (chunk) => {
                        const msg = state.messages.find(m => m.id === aiMsgId);
                        if (msg) { msg.content += chunk;
                            updateLastAiMessage(); }
                    });
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    const msg = state.messages.find(m => m.id === aiMsgId);
                    if (msg && !msg.content) msg.content = '[Requisição cancelada]';
                } else {
                    const msg = state.messages.find(m => m.id === aiMsgId);
                    if (msg) msg.content = '❌ Erro: ' + (e.message || 'Falha na conexão. Verifique sua rede.') +
                        '\n\n[🔁 Tentar novamente]';
                    toast('Erro de rede');
                }
                updateLastAiMessage();
            }
            state.isStreaming = false;
            state.abortController = null;
            stopTypingIndicator();
            saveMessages();
            renderMessages();
            scrollToBottom();
            renderConvList();
        }

        function updateLastAiMessage() {
            const list = document.getElementById('msg-list');
            const lastAi = state.messages.filter(m => m.role === 'ai').pop();
            if (!lastAi) return;
            const existing = list.querySelector(`[data-idx="${state.messages.indexOf(lastAi)}"]`);
            if (existing) {
                existing.querySelector('.msg-content').innerHTML = renderMarkdown(lastAi.content || '');
            } else {
                renderMessages();
            }
            scrollToBottom();
            updateScrollBtn();
        }

        function startTypingIndicator() {
            const area = document.getElementById('typing-area');
            state.typingTextIdx = 0;
            area.innerHTML =
                `<div class="typing-indicator"><div class="typing-dots"><span></span><span></span><span></span></div><span id="typing-text">${TYPING_TEXTS[0]}</span></div>`;
            state.typingInterval = setInterval(() => {
                state.typingTextIdx = (state.typingTextIdx + 1) % TYPING_TEXTS.length;
                const el = document.getElementById('typing-text');
                if (el) el.textContent = TYPING_TEXTS[state.typingTextIdx];
            }, 1800);
        }

        function stopTypingIndicator() {
            document.getElementById('typing-area').innerHTML = '';
            if (state.typingInterval) clearInterval(state.typingInterval);
            state.typingInterval = null;
        }

        // ─── STREAMING APIS ───
        async function streamGemini(contextMsgs, files, onChunk) {
            const modelName = state.currentModel.id.replace('gemini:', '');
            const url =
                `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:streamGenerateContent?alt=sse&key=${GEMINI_KEY}`;
            const contents = [];
            for (const m of contextMsgs) {
                const parts = [];
                if (m.role === 'user' && m.files) {
                    for (const f of m.files) {
                        if (f.isImage) {
                            const origFile = files.find(ff => ff.name === f.name && ff.isImage);
                            if (origFile && origFile.base64) {
                                parts.push({ inlineData: { mimeType: f.type, data: origFile.base64 } });
                            }
                        }
                    }
                }
                parts.push({ text: m.content || '' });
                contents.push({ role: m.role === 'ai' ? 'model' : 'user', parts });
            }
            const body = { contents, generationConfig: { temperature: state.temperature } };
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: state.abortController.signal,
            });
            if (!resp.ok) throw new Error('Gemini API: ' + resp.status);
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]' || !data.trim()) continue;
                        try {
                            const json = JSON.parse(data);
                            const chunk = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
                            if (chunk) onChunk(chunk);
                        } catch (e) {}
                    }
                }
            }
        }

        async function streamGroq(contextMsgs, files, onChunk) {
            const modelName = state.currentModel.id.replace('groq:', '');
            const url = 'https://api.groq.com/openai/v1/chat/completions';
            const messages = contextMsgs.map(m => {
                let content = m.content || '';
                if (m.role === 'user' && m.files) {
                    for (const f of m.files) {
                        if (!f.isImage) {
                            const origFile = files.find(ff => ff.name === f.name && !ff.isImage);
                            if (origFile && origFile.data) content += '\n\n[Conteúdo do arquivo "' + f.name + '"]:\n' +
                                origFile.data;
                        }
                    }
                }
                return { role: m.role === 'ai' ? 'assistant' : 'user', content };
            });
            const body = { model: modelName, messages, temperature: state.temperature, stream: true };
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
                body: JSON.stringify(body),
                signal: state.abortController.signal,
            });
            if (!resp.ok) throw new Error('Groq API: ' + resp.status);
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]' || !data.trim()) continue;
                        try {
                            const json = JSON.parse(data);
                            const chunk = json.choices?.[0]?.delta?.content || '';
                            if (chunk) onChunk(chunk);
                        } catch (e) {}
                    }
                }
            }
        }

        // ─── SLASH COMMANDS ───
        function handleSlashCommand(text) {
            const parts = text.trim().split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const arg = parts.slice(1).join(' ');
            switch (cmd) {
                case '/help':
                    toast('/help /clear /model /temp /export /reset /context');
                    return true;
                case '/clear':
                    state.messages = [];
                    saveMessages();
                    renderMessages();
                    showHero();
                    toast('Conversa limpa');
                    return true;
                case '/model':
                    const found = MODELS.find(m => m.name.toLowerCase().includes(arg.toLowerCase()) || m.id.toLowerCase()
                        .includes(arg.toLowerCase()));
                    if (found) { state.currentModel = found;
                        savePrefs();
                        toast('Modelo: ' + found.name); } else toast('Modelo não encontrado');
                    return true;
                case '/temp':
                    const t = parseFloat(arg);
                    if (!isNaN(t) && t >= 0 && t <= 1.5) { state.temperature = t;
                        savePrefs();
                        toast('Temperatura: ' + t); } else toast('Valor inválido (0-1.5)');
                    return true;
                case '/export':
                    exportCurrent();
                    return true;
                case '/reset':
                    if (confirm('Apagar TODOS os dados?')) {
                        Object.keys(localStorage).filter(k => k.startsWith('cia_')).forEach(k => localStorage.removeItem(
                            k));
                        state.sessions = [];
                        state.messages = [];
                        state.currentSessionId = null;
                        initStorage();
                        updateUIForSession();
                        showHero();
                        toast('Banco resetado');
                    }
                    return true;
                case '/context':
                    const c = parseInt(arg);
                    if (!isNaN(c) && c >= 1 && c <= 200) { state.contextLimit = c;
                        savePrefs();
                        toast('Contexto: ' + c); } else toast('Valor inválido (1-200)');
                    return true;
                default:
                    return false;
            }
        }

        // ─── FOCUS MODE ───
        function toggleFocus() {
            state.focusMode = !state.focusMode;
            document.getElementById('header').classList.toggle('hidden', state.focusMode);
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
            toast(state.focusMode ? 'Modo foco ativado' : 'Modo foco desativado');
        }

        // ─── EVENT LISTENERS ───
        document.getElementById('msg-list').addEventListener('scroll', updateScrollBtn);
        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                sendFromChat(); }
        });
        document.getElementById('hero-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                sendFromHero(); }
        });
        // Auto-resize textareas
        ['chat-input', 'hero-input'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', function() { this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
        });
        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(ov => {
            ov.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
        });
        // Keyboard shortcut for sidebar
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').classList.remove('show');
                document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault();
                toggleSidebar(); }
        });

        // ─── INIT ───
        function init() {
            initStorage();
            updateUIForSession();
            renderConvList();
            if (!state.currentSessionId || state.messages.length === 0) showHero();
            else showChat();
            document.getElementById('temp-slider').value = state.temperature;
            document.getElementById('temp-val').textContent = state.temperature;
            document.getElementById('ctx-slider').value = state.contextLimit;
            document.getElementById('ctx-val').textContent = state.contextLimit;
        }
        init();
        console.log('✦ Central de IAs — Pronto. Modelos:', MODELS.length, '| Sessões:', state.sessions.length);
    </script>
</body>
